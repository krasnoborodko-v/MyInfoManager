# ============================================================
# Platform Infrastructure
# ============================================================
# Общая инфраструктура для всех сервисов платформы.
#
# Запуск: docker-compose -f infra/docker-compose.yml up -d
# ============================================================

services:
  # ----------------------------------------------------------
  # Nginx — reverse proxy + SSL
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: platform-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - platform-net
    depends_on:
      - postgres

  # ----------------------------------------------------------
  # PostgreSQL — общая БД для всех сервисов
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PG_USER:-platform}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-platform_secret}
      - POSTGRES_DB=${PG_DB:-platform}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - platform-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  platform-net:
    driver: bridge

volumes:
  postgres-data:
