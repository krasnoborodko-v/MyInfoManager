# Upstream для MyInfoManager
upstream myinfomanager {
    server myinfomanager:8000;
}

# HTTP — можно добавить редирект на HTTPS
server {
    listen 80;
    server_name myinfomanager.example.com;  # Замените на ваш домен

    # Для продакшена раскомментируйте:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://myinfomanager;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Для WebSocket (если понадобятся)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        client_max_body_size 10m;
    }
}

